<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pain-Point Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');
  :root {
    --bg: #0b0b0b; --surface: #111; --card: #161616; --card-hover: #1c1c1c;
    --border: #252525; --border-hover: #3a3a3a; --accent: #ff4500;
    --hn-orange: #ff6600; --reddit-red: #ff4500; --slingr: #00c2a8;
    --slingr-border: #006b5c; --text: #efefef; --muted: #666;
    --green: #00e676; --surface2: #181818;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 2.5rem 1.5rem 4rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header-icon { font-size: 2.5rem; margin-bottom: 0.6rem; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: clamp(1.5rem, 4vw, 2.6rem); font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, #ff4500 20%, #ff9a3c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.4rem; }
  .header p { color: var(--muted); font-size: 0.8rem; line-height: 1.6; }
  .search-wrap { max-width: 760px; margin: 0 auto 1.6rem; }
  .search-label { font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.55rem; }
  .search-input-row { display: flex; gap: 0; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-right: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.88rem; padding: 0.85rem 1.2rem; border-radius: 4px 0 0 4px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: #444; }
  .search-clear { background: var(--surface); border: 1px solid var(--border); border-right: none; border-left: none; color: #555; cursor: pointer; padding: 0 0.8rem; font-size: 1rem; transition: color 0.2s; }
  .search-clear:hover { color: var(--accent); }
  .sources-wrap { max-width: 760px; margin: 0 auto 1.8rem; }
  .sources-label { font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 0.6rem; }
  .sources-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .source-toggle { display: flex; align-items: center; gap: 0.45rem; padding: 0.4rem 0.85rem; border-radius: 999px; font-size: 0.71rem; font-weight: 500; border: 1px solid; cursor: pointer; user-select: none; transition: all 0.18s; font-family: 'DM Mono', monospace; }
  .source-toggle input { display: none; }
  .source-toggle .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: opacity 0.2s; }
  .src-reddit   { background:#1a0b00; border-color:#5c2000; color:#ff7a4a; }
  .src-hn       { background:#1a1000; border-color:#5c3a00; color:#ffb04a; }
  .src-g2       { background:#0a1500; border-color:#2a4500; color:#8fff6a; }
  .src-capterra { background:#00102a; border-color:#003070; color:#60b8ff; }
  .src-so       { background:#1a0e00; border-color:#5c3500; color:#f8a94a; }
  .src-linkedin { background:#001220; border-color:#003660; color:#5ab4e8; }
  .source-toggle.unchecked { opacity: 0.38; filter: grayscale(0.6); }
  .scan-btn { display: block; margin: 0 auto 2.2rem; background: linear-gradient(135deg, #ff4500, #ff7034); color: white; border: none; padding: 1rem 3.5rem; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: 0.06em; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: all 0.2s; box-shadow: 0 0 28px rgba(255,69,0,0.22); }
  .scan-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 45px rgba(255,69,0,0.42); }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem; margin-bottom: 2rem; font-size: 0.68rem; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; color: var(--muted); }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-wrap { max-width: 900px; margin: 0 auto 1.5rem; }
  .status-bar { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 0.85rem 1.4rem; border-radius: 4px; font-size: 0.76rem; color: var(--muted); display: none; }
  .status-bar.active { display: block; }
  .pulse { display: inline-block; width: 7px; height: 7px; background: var(--green); border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .active-query { max-width: 900px; margin: 0 auto 1rem; display: none; }
  .active-query.visible { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .active-query-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .active-query-text { font-size: 0.78rem; color: var(--accent); font-family: 'DM Mono', monospace; background: #1a0800; border: 1px solid #3a1800; padding: 0.3rem 0.7rem; border-radius: 3px; }
  .active-sources { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .results-container { display: none; max-width: 900px; margin: 0 auto; }
  .results-container.visible { display: block; }
  .panel-inner { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem 1.4rem; }
  .stats-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stat-box { flex: 1; min-width: 90px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 0.85rem 1rem; text-align: center; }
  .stat-value { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:var(--text); line-height:1; margin-bottom:0.3rem; }
  .stat-label { font-size:0.62rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
